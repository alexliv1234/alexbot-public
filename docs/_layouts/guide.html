<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — AlexBot Guides</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
  <style>
    :root{--bg-primary:#0d1117;--bg-secondary:#161b22;--bg-card:rgba(22,27,34,0.7);--border:#30363d;--text-primary:#e6edf3;--text-secondary:#8b949e;--accent-blue:#58a6ff;--accent-purple:#bc8cff;--accent-gold:#d29922;--accent-green:#3fb950;--accent-red:#f85149;--font:'Inter',-apple-system,system-ui,sans-serif;--mono:'JetBrains Mono','Fira Code',monospace;--radius:12px}
    [data-theme="light"]{--bg-primary:#fff;--bg-secondary:#f6f8fa;--bg-card:#fff;--border:#d0d7de;--text-primary:#1f2328;--text-secondary:#656d76}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--font);background:var(--bg-primary);color:var(--text-primary);line-height:1.7;transition:background .3s,color .3s}
    .nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(20px);background:rgba(13,17,23,0.85);border-bottom:1px solid var(--border);transition:background .3s}
    [data-theme="light"] .nav{background:rgba(255,255,255,0.85)}
    .nav a{color:var(--text-secondary);text-decoration:none;font-size:14px;font-weight:500;transition:color .2s}
    .nav a:hover{color:var(--text-primary)}
    .nav-brand{font-weight:700;font-size:18px;color:var(--text-primary);text-decoration:none}
    /* theme-toggle handled by unified CSS */
    .page-wrapper{display:flex;max-width:1200px;margin:0 auto;padding-top:70px}
    .content{flex:1;max-width:780px;padding:30px 24px 80px}
    .toc{position:sticky;top:80px;width:240px;max-height:calc(100vh - 100px);overflow-y:auto;padding:16px;margin-left:32px;font-size:13px;display:none}
    .toc.has-items{display:block}
    .toc-title{font-weight:700;color:var(--text-primary);margin-bottom:12px;font-size:14px;text-transform:uppercase;letter-spacing:0.5px}
    .toc a{display:block;color:var(--text-secondary);text-decoration:none;padding:4px 0;border-left:2px solid transparent;padding-left:12px;transition:all .2s;line-height:1.4}
    .toc a:hover{color:var(--accent-blue)}
    .toc a.active{color:var(--accent-blue);border-left-color:var(--accent-blue)}
    .toc a.toc-h3{padding-left:24px;font-size:12px}
    .progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple));z-index:200;transition:width .1s;width:0%}
    .back{display:inline-flex;align-items:center;gap:6px;color:var(--accent-blue);text-decoration:none;font-size:14px;margin-bottom:32px}
    .back:hover{text-decoration:underline}
    h1{font-size:2.5rem;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    h2{font-size:1.5rem;margin-top:48px;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border);scroll-margin-top:80px}
    h3{font-size:1.2rem;margin-top:32px;margin-bottom:12px;color:var(--accent-blue);scroll-margin-top:80px}
    h4{font-size:1.05rem;margin-top:24px;margin-bottom:8px;color:var(--accent-purple)}
    p{margin-bottom:16px;color:var(--text-secondary)}
    strong{color:var(--text-primary)}
    em{color:var(--accent-purple);font-style:italic}
    a{color:var(--accent-blue)}
    ul,ol{margin-bottom:16px;padding-left:24px;color:var(--text-secondary)}
    li{margin-bottom:8px}
    li>ul,li>ol{margin-top:8px;margin-bottom:0}
    blockquote{border-left:3px solid var(--accent-purple);padding:12px 20px;margin:24px 0;background:var(--bg-secondary);border-radius:0 var(--radius) var(--radius) 0}
    blockquote p{color:var(--text-primary);margin:0;font-style:italic}
    code{background:var(--bg-secondary);padding:2px 6px;border-radius:4px;font-size:0.88em;color:var(--accent-gold);font-family:var(--mono)}
    pre{background:var(--bg-secondary);padding:16px;border-radius:var(--radius);overflow-x:auto;margin:16px 0;border:1px solid var(--border);position:relative}
    pre code{background:none;padding:0;color:var(--text-primary);font-size:0.85em;line-height:1.6}
    .copy-btn{position:absolute;top:8px;right:8px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text-secondary);cursor:pointer;opacity:0;transition:opacity .2s}
    pre:hover .copy-btn{opacity:1}
    .copy-btn:hover{color:var(--text-primary);background:var(--bg-primary)}
    hr{border:none;border-top:1px solid var(--border);margin:40px 0}
    table{width:100%;border-collapse:collapse;margin:16px 0;font-size:0.92em}
    th,td{padding:10px 14px;border:1px solid var(--border);text-align:left;color:var(--text-secondary)}
    th{background:var(--bg-secondary);color:var(--text-primary);font-weight:600}
    .mermaid{background:var(--bg-secondary);border-radius:var(--radius);padding:20px;margin:24px 0;border:1px solid var(--border);overflow-x:auto;text-align:center}
    .callout{background:var(--bg-secondary);border-left:3px solid var(--accent-gold);padding:12px 20px;margin:24px 0;border-radius:0 var(--radius) var(--radius) 0}
    .callout-title{font-weight:600;color:var(--accent-gold);margin-bottom:4px}
    .callout p{margin:0}
    img{max-width:100%;border-radius:var(--radius);margin:16px 0}
    /* ===== UNIFIED FOOTER ===== */
    .site-footer{padding:40px 24px;text-align:center;background:linear-gradient(to bottom,var(--bg-primary),var(--bg-secondary));border-top:1px solid var(--border)}
    .site-footer .footer-brand-row{display:flex;align-items:center;justify-content:center;gap:8px;font-weight:800;font-size:1.1rem;margin-bottom:8px}
    .site-footer .footer-tagline{color:var(--text-secondary);font-size:.85rem;margin-bottom:16px}
    .site-footer .footer-tagline a{color:var(--text-secondary);text-decoration:underline}
    .site-footer .footer-tagline a:hover{color:var(--accent-blue)}
    .footer-nav{display:flex;gap:24px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
    .footer-nav a{color:var(--text-secondary);font-size:.85rem;font-weight:500;transition:color .3s;text-decoration:none}
    .footer-nav a:hover{color:var(--accent-blue)}
    .site-footer .footer-copy{font-size:.75rem;color:var(--text-secondary);opacity:.5}
    @media(max-width:900px){.toc{display:none !important}.page-wrapper{padding-top:60px}}
    @media(max-width:640px){h1{font-size:1.8rem}.content{padding:20px 16px 60px}}
  
    .nav-hamburger{display:none;background:none;border:none;cursor:pointer;width:28px;height:20px;position:relative;padding:0}
    .nav-hamburger span{display:block;width:100%;height:2px;background:var(--text-primary);border-radius:2px;position:absolute;left:0;transition:all .3s}
    .nav-hamburger span:nth-child(1){top:0}
    .nav-hamburger span:nth-child(2){top:50%;transform:translateY(-50%)}
    .nav-hamburger span:nth-child(3){bottom:0}
    .nav-hamburger.open span:nth-child(1){top:50%;transform:translateY(-50%) rotate(45deg)}
    .nav-hamburger.open span:nth-child(2){opacity:0}
    .nav-hamburger.open span:nth-child(3){bottom:50%;transform:translateY(50%) rotate(-45deg)}
    @media(max-width:768px){
      .nav{padding:0 16px}
      .nav-links{position:fixed;top:56px;left:0;right:0;flex-direction:column;align-items:stretch;background:rgba(13,17,23,.95);backdrop-filter:blur(20px);padding:0;gap:4px;border-bottom:1px solid var(--border);max-height:0;overflow:hidden;opacity:0;pointer-events:none;transition:max-height .3s,opacity .3s,padding .3s}
      [data-theme="light"] .nav-links{background:rgba(255,255,255,.95)}
      .nav-links.open{max-height:400px;opacity:1;pointer-events:auto;padding:16px}
      .nav-hamburger{display:block}
      .nav-divider{width:100%;height:1px;margin:8px 0}
      .nav-page-links{flex-direction:column;gap:4px}
      .nav-link,.nav-page-links a,.nav-back{font-size:.95rem!important;padding:8px 0}
      .theme-toggle{align-self:flex-start;margin-top:4px}
    }
  
    .nav-link{color:var(--text-secondary)!important;font-size:.85rem;font-weight:500;text-decoration:none!important;transition:color .2s;position:relative;padding:4px 0}
    .nav-link:hover{color:var(--text-primary)!important}
    .nav-link.active{color:var(--accent-blue)!important}
    .nav-link.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--accent-blue);border-radius:1px}
    .nav-divider{width:1px;height:16px;background:var(--border);margin:0 4px}
    .nav-page-links{display:flex;gap:16px;align-items:center}
    .nav-page-links a{color:var(--text-secondary)!important;font-size:.8rem;font-weight:400;text-decoration:none!important;opacity:.7;transition:all .2s}
    .nav-page-links a:hover{color:var(--text-primary)!important;opacity:1}
    .nav-back{color:var(--text-secondary)!important;font-size:.8rem;font-weight:500;text-decoration:none!important;opacity:.8;transition:all .2s;display:flex;align-items:center;gap:4px}
    .nav-back:hover{color:var(--text-primary)!important;opacity:1}
    .nav-links{display:flex;align-items:center;gap:20px}
    .brand-icon{font-size:1.3rem;line-height:1}
    .brand-alex{background:linear-gradient(135deg,var(--accent-purple),var(--accent-blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .brand-text{color:var(--text-primary)}
    .nav.scrolled{box-shadow:0 4px 30px rgba(0,0,0,.15)}
  
/* ===== SUB-NAV (Row 2) ===== */
.sub-nav {
  position: fixed; top: 56px; left: 0; right: 0; z-index: 999;
  padding: 0 32px; height: 40px;
  display: flex; align-items: center;
  background: rgba(13,17,23,0.7);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(48,54,61,0.5);
  transition: all 0.3s;
}
[data-theme="light"] .sub-nav { background: rgba(246,248,250,0.8); }
.sub-nav-links {
  display: flex; gap: 24px; align-items: center; width: 100%;
}
.sub-nav-links a {
  color: var(--text-secondary); font-size: 0.8rem; font-weight: 400;
  text-decoration: none !important; transition: all 0.2s;
  padding: 2px 0; position: relative;
}
.sub-nav-links a:hover { color: var(--text-primary); }
.sub-nav-links a.active { color: var(--accent-blue); }
.sub-nav-links a.active::after {
  content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
  height: 2px; background: var(--accent-blue); border-radius: 1px;
}
.sub-nav-back {
  color: var(--text-secondary); font-size: 0.8rem; font-weight: 500;
  text-decoration: none !important; transition: all 0.2s;
  display: flex; align-items: center; gap: 4px;
}
.sub-nav-back:hover { color: var(--text-primary); }
@media (max-width: 768px) {
  .sub-nav { padding: 0 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .sub-nav-links { gap: 16px; white-space: nowrap; }
  .sub-nav-links a { font-size: 0.78rem; }
}
</style>
</head>
<body>
  <div class="progress" id="progress"></div>
  <nav class="nav" id="siteNav">
  <a href="/alexbot-public/" class="nav-brand">
    <span class="brand-icon">&#129302;</span>
    <span class="brand-text"><span class="brand-alex">Alex</span>Bot</span>
  </a>
  <div class="nav-links" id="navLinks">
    <a href="/alexbot-public/" class="nav-link" data-page="home">Home</a>
    <a href="/alexbot-public/learning-guides" class="nav-link active" data-page="guides">Guides</a>
    <a href="/alexbot-public/security-challenge" class="nav-link" data-page="security">Security</a>
    <a href="/alexbot-public/community" class="nav-link" data-page="community">Community</a>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">&#127769;</button>
    <button class="nav-hamburger" id="navHamburger" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="sub-nav" id="subNav">
  <div class="sub-nav-links">
    <a href="/alexbot-public/learning-guides" class="sub-nav-back" onclick="event.preventDefault();if(document.referrer&&document.referrer.includes('/alexbot-public'))history.back();else location.href='/alexbot-public/learning-guides'">&#8592; Back</a>
  </div>
</div>
  <div class="page-wrapper">
    <div class="content">
      {{ content }}
    </div>
    <aside class="toc" id="toc">
      <div class="toc-title">On this page</div>
      <nav id="tocNav"></nav>
    </aside>
  </div>
  <footer class="site-footer">
    <div class="footer-brand-row">
      <span class="brand-icon">&#129302;</span>
      <span><span class="brand-alex">Alex</span>Bot</span>
    </div>
    <p class="footer-tagline">A digital twin experiment by <a href="https://www.linkedin.com/in/alexliv" target="_blank" rel="noopener">Alex Liverant</a></p>
    <nav class="footer-nav">
      <a href="/alexbot-public/">Home</a>
      <a href="/alexbot-public/learning-guides">Learning Guides</a>
      <a href="/alexbot-public/security-challenge">Security Challenge</a>
      <a href="/alexbot-public/community">Community</a>
    </nav>
    <p class="footer-copy">&copy; 2026 AlexBot. Built with curiosity and 14,000+ messages.</p>
  </footer>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
  // ===== UNIFIED NAV JS =====
  (function(){
    var toggle = document.getElementById('themeToggle');
    var saved = localStorage.getItem('alexbot-theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
    var curTheme = document.documentElement.getAttribute('data-theme') || 'dark';
    if(curTheme==='light'){var hl=document.getElementById('hljs-theme');if(hl)hl.href='https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';}
    function updateIcon(){var t=document.documentElement.getAttribute('data-theme');toggle.innerHTML=t==='light'?'\u2600\uFE0F':'\uD83C\uDF19';}
    updateIcon();
    toggle.addEventListener('click',function(){
      var cur=document.documentElement.getAttribute('data-theme')||'dark';
      var next=cur==='light'?'dark':'light';
      document.documentElement.setAttribute('data-theme',next);
      localStorage.setItem('alexbot-theme',next);
      updateIcon();
      var hl=document.getElementById('hljs-theme');
      if(hl)hl.href=next==='light'?'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css':'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css';
      if(typeof reRenderMermaid==='function')reRenderMermaid(next);
    });
    // Hamburger
    var hamburger=document.getElementById('navHamburger');
    var navLinks=document.getElementById('navLinks');
    if(hamburger&&navLinks){hamburger.addEventListener('click',function(){hamburger.classList.toggle('open');navLinks.classList.toggle('open');});navLinks.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){hamburger.classList.remove('open');navLinks.classList.remove('open');});});}
    // Scroll shadow
    window.addEventListener('scroll',function(){var nav=document.getElementById('siteNav');if(nav)nav.classList.toggle('scrolled',window.scrollY>20);});
  })();
  // Keep toggleTheme as alias for any inline onclick references
  function toggleTheme(){document.getElementById('themeToggle').click();}

  // Convert Jekyll code.language-mermaid to div.mermaid
  var mermaidSources=[];
  document.querySelectorAll('code.language-mermaid').forEach(function(code,i){
    var pre=code.parentElement;
    var div=document.createElement('div');
    div.className='mermaid';div.id='mermaid-'+i;
    div.textContent=code.textContent;
    mermaidSources.push({id:'mermaid-'+i,source:code.textContent});
    pre.replaceWith(div);
  });

  function getMermaidConfig(theme){
    var isDark=theme==='dark';
    return{startOnLoad:false,theme:isDark?'dark':'default',
      themeVariables:isDark?{primaryColor:'#1c2128',primaryBorderColor:'#58a6ff',primaryTextColor:'#e6edf3',lineColor:'#58a6ff',secondaryColor:'#161b22',tertiaryColor:'#0d1117',noteTextColor:'#e6edf3',noteBkgColor:'#1c2128',noteBorderColor:'#30363d'}:{},
      flowchart:{curve:'basis',padding:15},sequence:{actorMargin:50,messageMargin:35}};
  }

  mermaid.initialize(getMermaidConfig(document.documentElement.getAttribute('data-theme')||'dark'));
  mermaid.run({querySelector:'.mermaid'}).catch(function(e){console.warn('Mermaid:',e)});

  async function reRenderMermaid(theme){
    mermaid.initialize(getMermaidConfig(theme));
    for(var i=0;i<mermaidSources.length;i++){
      var el=document.getElementById(mermaidSources[i].id);
      if(!el)continue;el.removeAttribute('data-processed');el.innerHTML='';el.textContent=mermaidSources[i].source;
    }
    try{await mermaid.run({querySelector:'.mermaid'});}catch(e){console.warn('Mermaid re-render:',e);}
  }

  // highlight.js
  document.querySelectorAll('pre code').forEach(function(block){
    if(!block.classList.contains('language-mermaid')&&!block.closest('.mermaid')){
      hljs.highlightElement(block);
      var pre=block.parentElement;var btn=document.createElement('button');
      btn.className='copy-btn';btn.textContent='Copy';
      btn.onclick=function(){navigator.clipboard.writeText(block.textContent);btn.textContent='Copied!';setTimeout(function(){btn.textContent='Copy'},1500)};
      pre.appendChild(btn);
    }
  });

  // Reading progress
  window.addEventListener('scroll',function(){
    var h=document.documentElement.scrollHeight-window.innerHeight;
    if(h>0)document.getElementById('progress').style.width=(window.scrollY/h*100)+'%';
  });

  // TOC
  (function(){
    var headings=document.querySelectorAll('.content h2,.content h3');
    var tocNav=document.getElementById('tocNav');var tocEl=document.getElementById('toc');
    if(headings.length<3)return;tocEl.classList.add('has-items');
    headings.forEach(function(h,i){
      if(!h.id)h.id='heading-'+i;
      var a=document.createElement('a');a.href='#'+h.id;
      a.textContent=h.textContent;a.className=h.tagName==='H3'?'toc-h3':'';
      tocNav.appendChild(a);
    });
    var observer=new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){
          tocNav.querySelectorAll('a').forEach(function(a){a.classList.remove('active')});
          var match=tocNav.querySelector('a[href="#'+entry.target.id+'"]');
          if(match)match.classList.add('active');
        }
      });
    },{rootMargin:'-80px 0px -60% 0px',threshold:0});
    headings.forEach(function(h){observer.observe(h)});
  })();
  </script>
</body>
</html>

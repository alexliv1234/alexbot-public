<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — AlexBot Security KB</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
  <style>
    :root{--bg-primary:#0d1117;--bg-secondary:#161b22;--bg-card:rgba(22,27,34,0.7);--border:#30363d;--text-primary:#e6edf3;--text-secondary:#8b949e;--accent-blue:#58a6ff;--accent-purple:#bc8cff;--accent-gold:#d29922;--accent-green:#3fb950;--accent-red:#f85149;--accent-crimson:#da3633;--accent-orange:#db6d28;--font:'Inter',-apple-system,system-ui,sans-serif;--mono:'JetBrains Mono','Fira Code',monospace;--radius:12px}
    [data-theme="light"]{--bg-primary:#fff;--bg-secondary:#f6f8fa;--bg-card:#fff;--border:#d0d7de;--text-primary:#1f2328;--text-secondary:#656d76;--accent-crimson:#cf222e;--accent-orange:#bc4c00}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--font);background:var(--bg-primary);color:var(--text-primary);line-height:1.7;transition:background .3s,color .3s}

    /* Navigation */
    .nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(20px);background:rgba(13,17,23,0.85);border-bottom:1px solid var(--border);transition:background .3s}
    [data-theme="light"] .nav{background:rgba(255,255,255,0.85)}
    .nav a{color:var(--text-secondary);text-decoration:none;font-size:14px;font-weight:500;transition:color .2s}
    .nav a:hover,.nav a.active{color:var(--accent-gold)}
    .nav-brand{font-weight:700;font-size:18px;color:var(--text-primary);text-decoration:none}
    /* theme-toggle handled by unified CSS */

    /* Layout */
    .page-wrapper{display:flex;max-width:1200px;margin:0 auto;padding-top:70px}
    .content{flex:1;max-width:780px;padding:30px 24px 80px}
    .toc{position:sticky;top:80px;width:240px;max-height:calc(100vh - 100px);overflow-y:auto;padding:16px;margin-left:32px;font-size:13px;display:none}
    .toc.has-items{display:block}
    .toc-title{font-weight:700;color:var(--text-primary);margin-bottom:12px;font-size:14px;text-transform:uppercase;letter-spacing:0.5px}
    .toc a{display:block;color:var(--text-secondary);text-decoration:none;padding:4px 0;border-left:2px solid transparent;padding-left:12px;transition:all .2s;line-height:1.4}
    .toc a:hover{color:var(--accent-gold)}
    .toc a.active{color:var(--accent-gold);border-left-color:var(--accent-gold)}
    .toc a.toc-h3{padding-left:24px;font-size:12px}

    /* Progress bar */
    .progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent-gold),var(--accent-red));z-index:200;transition:width .1s;width:0%}

    .back{display:inline-flex;align-items:center;gap:6px;color:var(--accent-gold);text-decoration:none;font-size:14px;margin-bottom:32px}
    .back:hover{text-decoration:underline}

    /* Headings */
    h1{font-size:2.5rem;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,var(--accent-gold),var(--accent-red));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    h2{font-size:1.5rem;margin-top:48px;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border);scroll-margin-top:80px}
    h3{font-size:1.2rem;margin-top:32px;margin-bottom:12px;color:var(--accent-gold);scroll-margin-top:80px}
    h4{font-size:1.05rem;margin-top:24px;margin-bottom:8px;color:var(--accent-purple)}
    p{margin-bottom:16px;color:var(--text-secondary)}
    strong{color:var(--text-primary)}
    em{color:var(--accent-purple);font-style:italic}
    a{color:var(--accent-gold)}
    ul,ol{margin-bottom:16px;padding-left:24px;color:var(--text-secondary)}
    li{margin-bottom:8px}
    li>ul,li>ol{margin-top:8px;margin-bottom:0}

    /* Callout boxes */
    blockquote{border-left:3px solid var(--accent-purple);padding:12px 20px;margin:24px 0;background:var(--bg-secondary);border-radius:0 var(--radius) var(--radius) 0}
    blockquote p{color:var(--text-primary);margin:0;font-style:italic}

    /* Severity badges */
    .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:0.75em;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;vertical-align:middle}
    .badge-critical{background:rgba(248,81,73,0.15);color:var(--accent-red);border:1px solid rgba(248,81,73,0.4);animation:pulse-red 2s infinite}
    .badge-high{background:rgba(219,109,40,0.15);color:var(--accent-orange);border:1px solid rgba(219,109,40,0.4)}
    .badge-medium{background:rgba(210,153,34,0.15);color:var(--accent-gold);border:1px solid rgba(210,153,34,0.4)}
    .badge-low{background:rgba(63,185,80,0.15);color:var(--accent-green);border:1px solid rgba(63,185,80,0.4)}
    .badge-fixed{background:rgba(63,185,80,0.15);color:var(--accent-green);border:1px solid rgba(63,185,80,0.4)}
    .badge-open{background:rgba(248,81,73,0.15);color:var(--accent-red);border:1px solid rgba(248,81,73,0.4)}
    .badge-partial{background:rgba(210,153,34,0.15);color:var(--accent-gold);border:1px solid rgba(210,153,34,0.4)}
    @keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(248,81,73,0.3)}50%{box-shadow:0 0 8px 2px rgba(248,81,73,0.15)}}

    /* Status dots */
    .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
    .dot-fixed{background:var(--accent-green);box-shadow:0 0 6px var(--accent-green)}
    .dot-open{background:var(--accent-red);box-shadow:0 0 6px var(--accent-red);animation:blink-dot 1.5s infinite}
    .dot-partial{background:var(--accent-gold);box-shadow:0 0 6px var(--accent-gold)}
    @keyframes blink-dot{0%,100%{opacity:1}50%{opacity:0.4}}

    /* Code blocks */
    code{background:var(--bg-secondary);padding:2px 6px;border-radius:4px;font-size:0.88em;color:var(--accent-gold);font-family:var(--mono)}
    pre{background:var(--bg-secondary);padding:16px;border-radius:var(--radius);overflow-x:auto;margin:16px 0;border:1px solid var(--border);position:relative}
    pre code{background:none;padding:0;color:var(--text-primary);font-size:0.85em;line-height:1.6}
    .copy-btn{position:absolute;top:8px;right:8px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text-secondary);cursor:pointer;opacity:0;transition:opacity .2s}
    pre:hover .copy-btn{opacity:1}
    .copy-btn:hover{color:var(--text-primary);background:var(--bg-primary)}

    /* Stats row */
    .stat-box{display:inline-flex;align-items:center;gap:8px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:8px 16px;margin:4px;font-size:0.9em}
    .stat-box .stat-num{font-size:1.4em;font-weight:700;color:var(--accent-gold)}
    .stat-box .stat-label{color:var(--text-secondary);font-size:0.85em}
    .stats-row{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}

    /* WhatsApp Chat Replay */
    .wa-chat{background:#0b141a;border-radius:var(--radius);overflow:hidden;margin:24px 0;border:1px solid #1f2c34;box-shadow:0 4px 24px rgba(0,0,0,0.3)}
    [data-theme="light"] .wa-chat{background:#e5ddd5;border-color:#d1c7b7}
    .wa-header{background:#1f2c34;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a3942}
    [data-theme="light"] .wa-header{background:#075e54;border-bottom-color:#064e44}
    .wa-name{color:#e9edef;font-weight:600;font-size:14px}
    [data-theme="light"] .wa-name{color:#fff}
    .wa-group{color:#8696a0;font-size:12px}
    [data-theme="light"] .wa-group{color:rgba(255,255,255,0.7)}
    .wa-body{padding:12px 16px;min-height:60px;background-image:url("data:image/svg+xml,%3Csvg width='300' height='300' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cpattern id='p' width='60' height='60' patternUnits='userSpaceOnUse'%3E%3Ccircle cx='10' cy='10' r='1' fill='%23ffffff08'/%3E%3C/pattern%3E%3C/defs%3E%3Crect fill='url(%23p)' width='300' height='300'/%3E%3C/svg%3E")}
    .wa-msg{max-width:85%;padding:6px 12px 4px;margin:4px 0;border-radius:8px;position:relative;font-size:13.5px;line-height:1.45;opacity:0;transform:translateY(10px);transition:opacity .4s ease,transform .4s ease}
    .wa-msg.visible{opacity:1;transform:translateY(0)}
    .wa-msg p{color:#e9edef;margin:0 0 2px;font-size:13.5px}
    [data-theme="light"] .wa-msg p{color:#303030}
    .wa-attacker{background:#1f2c34;margin-right:auto;border-top-left-radius:0}
    [data-theme="light"] .wa-attacker{background:#fff}
    .wa-bot{background:#005c4b;margin-left:auto;border-top-right-radius:0}
    [data-theme="light"] .wa-bot{background:#d9fdd3}
    .wa-system{text-align:center;margin:8px auto;max-width:70%}
    .wa-system p{background:rgba(31,44,52,0.8);display:inline-block;padding:4px 12px;border-radius:6px;font-size:11px;color:#8696a0}
    [data-theme="light"] .wa-system p{background:rgba(255,230,150,0.8);color:#54656f}
    .wa-sender{display:block;font-size:11px;font-weight:600;margin-bottom:2px}
    .wa-attacker .wa-sender{color:#f77e70}
    .wa-bot .wa-sender{color:#53bdeb}
    [data-theme="light"] .wa-attacker .wa-sender{color:#e65100}
    [data-theme="light"] .wa-bot .wa-sender{color:#075e54}
    .wa-time{display:block;text-align:right;font-size:10px;color:#8696a0;margin-top:2px}
    .wa-msg.wa-danger{border-left:3px solid var(--accent-red)}
    .wa-msg.wa-caught .wa-sender::after{content:' \2014  CAUGHT';color:var(--accent-green);font-size:10px}
    .wa-msg.wa-breached .wa-sender::after{content:' \2014  BREACHED';color:var(--accent-red);font-size:10px}
    .wa-verdict{text-align:center;padding:10px;font-weight:700;font-size:14px;letter-spacing:0.5px}
    .wa-blocked{background:rgba(63,185,80,0.15);color:var(--accent-green);border-top:1px solid rgba(63,185,80,0.3)}
    .wa-breached-verdict{background:rgba(248,81,73,0.15);color:var(--accent-red);border-top:1px solid rgba(248,81,73,0.3)}
    .wa-partial-verdict{background:rgba(210,153,34,0.15);color:var(--accent-gold);border-top:1px solid rgba(210,153,34,0.3)}

    /* Scroll-triggered fade-in */
    .content h2,.content h3,.content blockquote,.content table,.content .wa-chat,.content .mermaid,.content .stats-row{opacity:0;transform:translateY(20px);transition:opacity 0.6s ease,transform 0.6s ease}
    .content .revealed{opacity:1;transform:translateY(0)}

    hr{border:none;border-top:1px solid var(--border);margin:40px 0}
    table{width:100%;border-collapse:collapse;margin:16px 0;font-size:0.92em}
    th,td{padding:10px 14px;border:1px solid var(--border);text-align:left;color:var(--text-secondary)}
    th{background:var(--bg-secondary);color:var(--text-primary);font-weight:600}
    .mermaid{background:var(--bg-secondary);border-radius:var(--radius);padding:20px;margin:24px 0;border:1px solid var(--border);overflow-x:auto;text-align:center}
    img{max-width:100%;border-radius:var(--radius);margin:16px 0}
    /* ===== UNIFIED FOOTER ===== */
    .site-footer{padding:40px 24px;text-align:center;background:linear-gradient(to bottom,var(--bg-primary),var(--bg-secondary));border-top:1px solid var(--border)}
    .site-footer .footer-brand-row{display:flex;align-items:center;justify-content:center;gap:8px;font-weight:800;font-size:1.1rem;margin-bottom:8px}
    .site-footer .footer-tagline{color:var(--text-secondary);font-size:.85rem;margin-bottom:16px}
    .site-footer .footer-tagline a{color:var(--text-secondary);text-decoration:underline}
    .site-footer .footer-tagline a:hover{color:var(--accent-blue)}
    .footer-nav{display:flex;gap:24px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
    .footer-nav a{color:var(--text-secondary);font-size:.85rem;font-weight:500;transition:color .3s;text-decoration:none}
    .footer-nav a:hover{color:var(--accent-blue)}
    .site-footer .footer-copy{font-size:.75rem;color:var(--text-secondary);opacity:.5}
    @media(max-width:900px){.toc{display:none !important}.page-wrapper{padding-top:60px}.wa-msg{max-width:92%}}
    @media(max-width:640px){h1{font-size:1.8rem}.content{padding:20px 16px 60px}}
  </style>
</head>
<body>
  <div class="progress" id="progress"></div>
  <nav class="nav" id="siteNav">
  <a href="/alexbot-public/" class="nav-brand">
    <span class="brand-icon">&#129302;</span>
    <span class="brand-text"><span class="brand-alex">Alex</span>Bot</span>
  </a>
  <div class="nav-links" id="navLinks">
    <a href="/alexbot-public/" class="nav-link" data-page="home">Home</a>
    <a href="/alexbot-public/learning-guides" class="nav-link" data-page="guides">Guides</a>
    <a href="/alexbot-public/security-challenge" class="nav-link active" data-page="security">Security</a>
    <a href="/alexbot-public/community" class="nav-link" data-page="community">Community</a>
    <span class="nav-divider"></span>
    <a href="/alexbot-public/security-challenge#deep-dives" class="nav-back" onclick="event.preventDefault();if(document.referrer&&document.referrer.includes('/alexbot-public'))history.back();else location.href='/alexbot-public/security-challenge#deep-dives'">&#8592; Back</a>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">&#127769;</button>
    <button class="nav-hamburger" id="navHamburger" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</nav>
  <div class="page-wrapper">
    <div class="content">
      <a href="/alexbot-public/security-challenge#deep-dives" class="back">&larr; Back to Security Challenge</a>
      {{ content }}
    </div>

  </div>

      <a href="/alexbot-public/security-challenge">Security Challenge</a>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
  // ===== UNIFIED NAV JS =====
  (function(){
    var toggle = document.getElementById('themeToggle');
    var saved = localStorage.getItem('alexbot-theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
    var curTheme = document.documentElement.getAttribute('data-theme') || 'dark';
    if(curTheme==='light'){var hl=document.getElementById('hljs-theme');if(hl)hl.href='https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';}
    function updateIcon(){var t=document.documentElement.getAttribute('data-theme');toggle.innerHTML=t==='light'?'\u2600\uFE0F':'\uD83C\uDF19';}
    updateIcon();
    toggle.addEventListener('click',function(){
      var cur=document.documentElement.getAttribute('data-theme')||'dark';
      var next=cur==='light'?'dark':'light';
      document.documentElement.setAttribute('data-theme',next);
      localStorage.setItem('alexbot-theme',next);
      updateIcon();
      var hl=document.getElementById('hljs-theme');
      if(hl)hl.href=next==='light'?'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css':'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css';
      if(typeof reRenderMermaid==='function')reRenderMermaid(next);
    });
    // Hamburger
    var hamburger=document.getElementById('navHamburger');
    var navLinks=document.getElementById('navLinks');
    if(hamburger&&navLinks){hamburger.addEventListener('click',function(){hamburger.classList.toggle('open');navLinks.classList.toggle('open');});navLinks.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){hamburger.classList.remove('open');navLinks.classList.remove('open');});});}
    // Scroll shadow
    window.addEventListener('scroll',function(){var nav=document.getElementById('siteNav');if(nav)nav.classList.toggle('scrolled',window.scrollY>20);});
  })();
  // Keep toggleTheme as alias for any inline onclick references
  function toggleTheme(){document.getElementById('themeToggle').click();}

  var mermaidSources=[];
  document.querySelectorAll('code.language-mermaid').forEach(function(code,i){
    var pre=code.parentElement;var div=document.createElement('div');
    div.className='mermaid';div.id='mermaid-'+i;div.textContent=code.textContent;
    mermaidSources.push({id:'mermaid-'+i,source:code.textContent});pre.replaceWith(div);
  });
  function getMermaidConfig(theme){
    var isDark=theme==='dark';
    return{startOnLoad:false,theme:isDark?'dark':'default',
      themeVariables:isDark?{primaryColor:'#2d1b00',primaryBorderColor:'#d29922',primaryTextColor:'#e6edf3',lineColor:'#d29922',secondaryColor:'#1c0a00',tertiaryColor:'#0d1117',noteTextColor:'#e6edf3',noteBkgColor:'#1c2128',noteBorderColor:'#30363d'}:{},
      flowchart:{curve:'basis',padding:15},sequence:{actorMargin:50,messageMargin:35}};
  }
  mermaid.initialize(getMermaidConfig(savedTheme));
  mermaid.run({querySelector:'.mermaid'}).catch(function(e){console.warn('Mermaid:',e)});
  async function reRenderMermaid(theme){
    mermaid.initialize(getMermaidConfig(theme));
    for(var i=0;i<mermaidSources.length;i++){
      var el=document.getElementById(mermaidSources[i].id);
      if(!el)continue;el.removeAttribute('data-processed');el.innerHTML='';el.textContent=mermaidSources[i].source;
    }
    try{await mermaid.run({querySelector:'.mermaid'});}catch(e){console.warn('Mermaid re-render:',e);}
  }

  document.querySelectorAll('pre code').forEach(function(block){
    if(!block.classList.contains('language-mermaid')&&!block.closest('.mermaid')){
      hljs.highlightElement(block);
      var pre=block.parentElement;var btn=document.createElement('button');
      btn.className='copy-btn';btn.textContent='Copy';
      btn.onclick=function(){navigator.clipboard.writeText(block.textContent);btn.textContent='Copied!';setTimeout(function(){btn.textContent='Copy'},1500)};
      pre.appendChild(btn);
    }
  });

  window.addEventListener('scroll',function(){
    var h=document.documentElement.scrollHeight-window.innerHeight;
    if(h>0)document.getElementById('progress').style.width=(window.scrollY/h*100)+'%';
  });

  (function(){
    var headings=document.querySelectorAll('.content h2,.content h3');
    var tocNav=document.getElementById('tocNav');var tocEl=document.getElementById('toc');
    if(headings.length<3)return;tocEl.classList.add('has-items');
    headings.forEach(function(h,i){
      if(!h.id)h.id='heading-'+i;
      var a=document.createElement('a');a.href='#'+h.id;
      a.textContent=h.textContent;a.className=h.tagName==='H3'?'toc-h3':'';
      tocNav.appendChild(a);
    });
    var observer=new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){
          tocNav.querySelectorAll('a').forEach(function(a){a.classList.remove('active')});
          var match=tocNav.querySelector('a[href="#'+entry.target.id+'"]');
          if(match)match.classList.add('active');
        }
      });
    },{rootMargin:'-80px 0px -60% 0px',threshold:0});
    headings.forEach(function(h){observer.observe(h)});
  })();

  (function(){
    var els=document.querySelectorAll('.content h2,.content h3,.content blockquote,.content table,.content .wa-chat,.content .mermaid,.content .stats-row');
    var revealObs=new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){entry.target.classList.add('revealed');revealObs.unobserve(entry.target)}
      });
    },{rootMargin:'0px 0px -60px 0px',threshold:0.1});
    els.forEach(function(el){revealObs.observe(el)});
  })();

  (function(){
    document.querySelectorAll('.wa-chat').forEach(function(chat){
      var msgs=chat.querySelectorAll('.wa-msg');
      var chatObs=new IntersectionObserver(function(entries){
        entries.forEach(function(entry){
          if(entry.isIntersecting){
            msgs.forEach(function(msg,i){
              setTimeout(function(){msg.classList.add('visible')},i*300);
            });
            chatObs.unobserve(entry.target);
          }
        });
      },{threshold:0.2});
      chatObs.observe(chat);
    });
  })();
  </script>
</body>
</html>
